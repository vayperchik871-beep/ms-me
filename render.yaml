services:
  - type: web
    name: ms-messenger-server
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: ms-messenger-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        value: "admin123"
    nodeVersion: "22"
