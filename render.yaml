services:
  - type: web
    name: ms-messenger-server
    env: node
    plan: free
    buildCommand: npm install --ignore-scripts=true && npm install --prefix server && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
    nodeVersion: "22"
