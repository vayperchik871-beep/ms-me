name: iOS Build

on:
  push:
    branches: [ main ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 30

    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build .app
        run: |
          xcodebuild build \
            -project MsMessenger.xcodeproj \
            -scheme MsMessenger \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.ms.messenger

      - name: Package .app
        run: |
          mkdir -p artifact
          cp -R build/Build/Products/Debug-iphoneos/MsMessenger.app artifact/
          cd artifact
          zip -r MsMessenger.zip MsMessenger.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MS-Messenger-iOS
          path: ios/artifact/MsMessenger.zip
          compression-level: 0
          retention-days: 14
