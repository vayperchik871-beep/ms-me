name: iOS Build

on:
  push:
    branches: [ main ]
    paths: [ 'ios/**', '.github/workflows/ios.yml' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen & generate .xcodeproj
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build .app (Simulator)
        run: |
          xcodebuild build \
            -project MsMessenger.xcodeproj \
            -scheme MsMessenger \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package artifact (ZIP for Appetize)
        run: |
          mkdir -p artifact
          APP_PATH=$(find build/Build/Products/Debug-iphonesimulator -name "MsMessenger.app" -maxdepth 1)
          echo "Found app at: $APP_PATH"
          ditto -c -k --sequesterRsrc "$APP_PATH" artifact/MsMessenger-iOS.zip
          unzip -l artifact/MsMessenger-iOS.zip | head -10

      - uses: actions/upload-artifact@v4
        with:
          name: MsMessenger-iOS
          path: ios/artifact/MsMessenger-iOS.zip
          retention-days: 14
