name: iOS Build

on:
  push:
    branches: [ main ]
    paths: [ 'ios/**', '.github/workflows/ios.yml' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen & generate .xcodeproj
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project MsMessenger.xcodeproj \
            -scheme MsMessenger \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify .app exists
        run: |
          find build -name "MsMessenger.app" -type d
          ls -la build/Build/Products/Debug-iphonesimulator/MsMessenger.app/

      - name: Create ZIP
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r /tmp/MsMessenger-iOS.zip MsMessenger.app
          echo "=== ZIP contents ==="
          unzip -l /tmp/MsMessenger-iOS.zip
          mkdir -p ../../../../artifact
          cp /tmp/MsMessenger-iOS.zip ../../../../artifact/MsMessenger-iOS.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MsMessenger-iOS
          path: ios/artifact/MsMessenger-iOS.zip
          retention-days: 14
