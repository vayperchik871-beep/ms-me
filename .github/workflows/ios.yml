name: iOS Build

on:
  push:
    branches: [ main ]
    paths: [ 'ios/**', '.github/workflows/ios.yml' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen & generate .xcodeproj
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build .app
        run: |
          xcodebuild build \
            -project MsMessenger.xcodeproj \
            -scheme MsMessenger \
            -sdk iphoneos \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package artifact (IPA)
        run: |
          mkdir -p artifact/Payload
          cp -R build/Build/Products/Debug-iphoneos/MsMessenger.app artifact/Payload/
          cd artifact && zip -r MsMessenger-iOS.ipa Payload/MsMessenger.app

      - uses: actions/upload-artifact@v4
        with:
          name: MsMessenger-iOS
          path: ios/artifact/MsMessenger-iOS.ipa
          retention-days: 14
