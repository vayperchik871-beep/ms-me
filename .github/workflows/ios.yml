name: iOS Build

on:
  push:
    branches: [ main ]
    paths: [ 'ios/**', '.github/workflows/ios.yml' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen & generate .xcodeproj
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project MsMessenger.xcodeproj \
            -scheme MsMessenger \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app
        run: |
          APP="build/Build/Products/Debug-iphonesimulator/MsMessenger.app"
          echo "=== .app contents ==="
          ls -la "$APP"
          echo "=== Creating tar.gz ==="
          tar -czf /tmp/MsMessenger-iOS.tar.gz -C build/Build/Products/Debug-iphonesimulator MsMessenger.app
          echo "=== tar.gz contents ==="
          tar -tzf /tmp/MsMessenger-iOS.tar.gz | head -5
          cp /tmp/MsMessenger-iOS.tar.gz MsMessenger-iOS.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: MsMessenger-iOS
          path: ios/MsMessenger-iOS.tar.gz
          retention-days: 14
