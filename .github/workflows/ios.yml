name: iOS Build

on:
  push:
    branches: [ main ]
    paths: [ 'ios/**', '.github/workflows/ios.yml' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen & generate .xcodeproj
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build for Simulator
        run: |
          set -e
          xcodebuild build \
            -project MsMessenger.xcodeproj \
            -scheme MsMessenger \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO
          echo "=== Build products ==="
          find build/Build/Products -name "*.app" -type d
          test -d build/Build/Products/Debug-iphonesimulator/MsMessenger.app

      - name: Package for Appetize
        run: |
          set -e
          cd build/Build/Products/Debug-iphonesimulator
          zip -r MsMessenger.zip MsMessenger.app
          unzip -l MsMessenger.zip
          cp MsMessenger.zip ../../../../MsMessenger.zip

      - uses: actions/upload-artifact@v4
        with:
          name: MsMessenger-iOS
          path: ios/MsMessenger.zip
          retention-days: 14
