name: iOS Build

on:
  push:
    branches: [ main ]
    paths: [ 'ios/**', '.github/workflows/ios.yml' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install XcodeGen & generate .xcodeproj
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build for Simulator
        run: |
          xcodebuild build \
            -project MsMessenger.xcodeproj \
            -scheme MsMessenger \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA for Appetize
        run: |
          APP="build/Build/Products/Debug-iphonesimulator/MsMessenger.app"
          ls -la "$APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -r /tmp/MsMessenger.zip Payload
          unzip -l /tmp/MsMessenger.zip
          cp /tmp/MsMessenger.zip ../../MsMessenger.zip
          echo "Upload this file to Appetize.io"

      - uses: actions/upload-artifact@v4
        with:
          name: MsMessenger-iOS
          path: MsMessenger.zip
          retention-days: 14
