name: MsMessenger
options:
  bundleIdPrefix: com.ms
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  SWIFT_VERSION: "6.0"

targets:
  MsMessenger:
    type: application
    platform: iOS
    sources:
      - path: MsMessenger
    info:
      path: MsMessenger/Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.ms.messenger
      INFOPLIST_FILE: MsMessenger/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      DEVELOPMENT_TEAM: ""
    dependencies:
      - sdk: AuthenticationServices.framework
      - sdk: CryptoKit.framework
      - sdk: UIKit.framework
